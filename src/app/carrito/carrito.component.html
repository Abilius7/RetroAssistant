<div class="container" *ngIf="productos!=''">

    <section class="row">
        <div class="col-12 ">
            <h2>Carrito</h2>
            <figure class="row align-items-center">
                <div class="col-lg-6 col-md-12 col-sm-12 col-xs-12 row">
                    <table mat-table [dataSource]="productos" class="mat-elevation-z8">

                        <!--- Note that these columns can be defined in any order.
                              The actual rendered columns are set as a property on the row definition" -->

                        <!-- Position Column -->
                        <ng-container matColumnDef="Producto">
                            <th mat-header-cell *matHeaderCellDef> Producto</th>
                            <td mat-cell *matCellDef="let element"> {{element.producto}} </td>
                        </ng-container>

                        <!-- Name Column -->
                        <ng-container matColumnDef="Cantidad">
                            <th mat-header-cell *matHeaderCellDef> Cantidad </th>
                            <td mat-cell *matCellDef="let element"> {{element.cantidad}} </td>
                        </ng-container>

                        <!-- Weight Column -->
                        <ng-container matColumnDef="Precio Unitario">
                            <th mat-header-cell *matHeaderCellDef> Precio Unitario </th>
                            <td mat-cell *matCellDef="let element"> {{element.precioUnitario}} </td>
                        </ng-container>

                        <ng-container matColumnDef="Precio Total">
                            <th mat-header-cell *matHeaderCellDef> Precio total </th>
                            <td mat-cell *matCellDef="let element"> {{element.precioTotal}} </td>
                        </ng-container>

                        <!-- Meter eliminar -->
                        <ng-container matColumnDef="Eliminar">
                            <th mat-header-cell *matHeaderCellDef> Eliminar </th>
                            <td mat-cell *matCellDef="let element">
                                <mat-form-field class="example-full-width col-6" appearance="fill">
                                    <mat-label>Cantidad</mat-label>
                                    <input matInput placeholder="1" id="{{element.producto}}" value="1" type="number" min="0" max="{{element.cantidad}}">
                                </mat-form-field>
                                <button mat-fab  (click)="eliminarProducto(element.producto)">
                                    <mat-icon>delete</mat-icon>
                                </button>
                            </td>
                        </ng-container>

                        <tr mat-header-row *matHeaderRowDef="cabecera"></tr>
                        <tr mat-row *matRowDef="let row; columns: cabecera;"></tr>
                    </table>

                </div>
                <div class="col-lg-6 col-md-12 col-sm-12 col-xs-12 ">
                    <button mat-stroked-button class="col-12 comprar" (click)="comprarProductos()">Comprar</button>
                    <button mat-stroked-button routerLink="/Inicio" class="col-12">Seguir comprando</button>
                </div>



            </figure>
            <div class="row ">

            </div>
        </div>
    </section>
</div>

<div class="container sinDatos" *ngIf="productos==''">
    <h1>No tienes productos en el carrito</h1>
    <img src="../../assets/logoRetroAssistant.png">
</div>
