<mat-card>
    <p> Id Pedido: {{pedido.idPedido}}</p>
    <p> Fecha Compra: {{pedido.fecha|cambioFecha}}</p>
    <p> Precio total: {{precioTotal}}</p>

    <table mat-table [dataSource]="productos" class="mat-elevation-z8">


        <ng-container matColumnDef="Producto">
            <th mat-header-cell *matHeaderCellDef> Producto </th>
            <td mat-cell *matCellDef="let element"> {{element.producto}} </td>
        </ng-container>


        <ng-container matColumnDef="Cantidad">
            <th mat-header-cell *matHeaderCellDef> Cantidad </th>
            <td mat-cell *matCellDef="let element"> {{element.cantidad}} </td>
        </ng-container>


        <ng-container matColumnDef="Precio">
            <th mat-header-cell *matHeaderCellDef> Precio </th>
            <td mat-cell *matCellDef="let element"> {{element.precio}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="cabecera"></tr>
        <tr mat-row *matRowDef="let row; columns: cabecera;"></tr>
    </table>



</mat-card>
